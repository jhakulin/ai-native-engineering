{
  "name": "ai-native-product-management",
  "title": "AI Native Product Management Research Inbox",
  "brief_title": "AI Native Product Management Research Brief",
  "analysis_focus": ["product discovery", "PM agent workflows", "product-engineering collaboration", "management operating models", "metrics", "governance"],
  "description": "Track AI-native product management practices, how product managers and engineering managers use AI agents, collaboration patterns between PMs and development teams, product discovery and delivery workflows with agents, management operating models, governance, metrics, and adoption patterns that can improve this repository's AI-native engineering strategy notes, guidelines, and reusable skills.",
  "idea_output": {
    "directory": "ideas/ai-native-product-management"
  },
  "facets": [
    "product_discovery",
    "product_delivery",
    "pm_agent_workflows",
    "engineering_collaboration",
    "management_operating_model",
    "metrics_governance",
    "adoption_change_management"
  ],
  "current_context": {
    "include": [
      "AGENTS.md",
      "CLAUDE.md",
      "README.md",
      "guidelines/*.md",
      "skills/*/SKILL.md",
      "strategies/*.md"
    ],
    "exclude": [
      "**/.env",
      "**/node_modules/**",
      "**/.git/**",
      "research/**",
      "research-history/**",
      "research-targets/**"
    ]
  },
  "dynamic_query_planning": {
    "enabled": true,
    "use_web_search": true,
    "max_dynamic_queries": 2,
    "max_results": 6,
    "candidate_pool": 12,
    "sort": "latest",
    "max_query_terms": 3
  },
  "youtube_searches": [
    {
      "query": "AI product management",
      "sort": "latest",
      "max_results": 6,
      "candidate_pool": 12
    },
    {
      "query": "product managers agents",
      "sort": "latest",
      "max_results": 6,
      "candidate_pool": 12
    }
  ],
  "source_limits": {
    "max_video_transcripts": 6
  },
  "selection": {
    "min_duration_seconds": 300
  },
  "source_history": {
    "path": "research-history/ai-native-product-management/sources.jsonl",
    "exclude_previously_used": true,
    "allow_reuse_after_days": 90
  },
  "retention": {
    "enabled": false,
    "keep_latest_runs": 3,
    "delete_runs_older_than_days": 7
  }
}
